spring:
  application:
    name: dash
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

# 소셜 로그인 검증 — client-id 설정 시 JWKS 서명·iss·aud·exp 완전검증,
# 비어있으면(local) 서명검증 비활성: payload claims 파싱만 수행(WARN 로그).
apple:
  client-id: ${APPLE_CLIENT_ID:}
  issuer: ${APPLE_ISSUER:https://appleid.apple.com}
  jwks-uri: ${APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}
google:
  client-id: ${GOOGLE_CLIENT_ID:}
  issuer: ${GOOGLE_ISSUER:https://accounts.google.com}
  jwks-uri: ${GOOGLE_JWKS_URI:https://www.googleapis.com/oauth2/v3/certs}
