spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dash_db
    username: dash_user
    password: dash_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    # local 전용: 스키마(db/migration) + dev 시드(db/seed). 운영 프로파일엔 db/seed 미포함.
    locations: classpath:db/migration,classpath:db/seed
    # 시드를 V900 으로 고정하는 스킴상 이후 추가되는 실제 마이그레이션(V4+)은 항상 900 보다
    # 낮은 out-of-order 가 되므로 local 에서만 허용한다(운영 프로파일엔 db/seed 없음).
    out-of-order: true

server:
  port: 8080

jwt:
  secret: bG9jYWwtc2VjcmV0LWtleS1mb3ItZGFzaC1kZXZlbG9wbWVudC0zMg==
  expiration: 86400000
  refresh-expiration: 604800000

logging:
  level:
    com.dash: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  base-url: http://localhost:8080
