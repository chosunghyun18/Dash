spring:
  datasource:
    url: jdbc:postgresql://db:5432/dash_db
    username: dash_user
    password: dash_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: bG9jYWwtc2VjcmV0LWtleS1mb3ItZGFzaC1kZXZlbG9wbWVudC0zMg==
  expiration: 86400000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  base-url: http://localhost:8080
